<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily arXiv Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .app {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            flex: 1;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
        }
        
        .gesture-hint {
            font-size: 10px;
            color: #666;
            white-space: nowrap;
        }
        
        .date-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #dateInput {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .category-filter {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            z-index: 999;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .category-scroll {
            display: inline-flex;
            gap: 8px;
        }
        
        .category-button {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .category-button.active {
            background: #667eea;
            color: white;
        }
        
        .category-count {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }
        
        .category-button.active .category-count {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .main-content {
            flex: 1;
            margin-top: 120px;
            margin-bottom: 120px;
            display: flex;
            flex-direction: column;
        }
        
        .card-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .paper-card {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px;
            padding-bottom: 100px;
            background: white;
            border-radius: 16px;
            margin: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            touch-action: auto;
            overflow-y: auto;
        }
        
        .card-content {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        
        .favorite-btn:hover {
            background: #f0f0f0;
        }
        
        .favorite-btn.favorited {
            color: #ff4757;
        }
        
        .paper-header {
            margin-bottom: 16px;
        }
        
        .paper-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .paper-info {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .paper-meta {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .ai-summary {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 16px;
            flex: 2;
        }
        
        .paper-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .section-content {
            font-size: 13px;
            line-height: 1.5;
            color: #666;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tag {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .paper-info {
            font-size: 12px;
            color: #999;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .nav-controls {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 6px;
            z-index: 999;
        }
        
        .nav-btn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            text-align: center;
        }
        
        .nav-btn.favorite-btn {
            background: #ff4757;
        }
        
        .nav-btn.favorite-btn:hover {
            background: #ff3742;
        }
        
        .nav-btn:hover {
            background: #5a6fd8;
        }
        
        .nav-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            z-index: 1000;
        }
        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .collection-view {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 60px;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            overflow-y: auto;
            z-index: 998;
        }
        
        .collection-view.active {
            display: block;
        }
        
        .collection-item {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
        }
        
        .collection-item h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .collection-item p {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .collection-actions {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .action-btn:hover {
            background: #f0f0f0;
        }
        
        .export-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            padding: 20px;
            text-align: center;
            color: #ff4757;
        }
        
        .swipe-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 8px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid #f0f0f0;
        }
        
        @media (max-width: 480px) {
            .paper-card {
                margin: 5px;
                padding: 16px;
            }
            
            .paper-title {
                font-size: 16px;
            }
            
            .ai-summary {
                font-size: 13px;
            }
            
            .main-content {
                margin-top: 110px;
                margin-bottom: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Daily arXiv</h1>
            <div class="header-controls">
                <div class="date-selector">
                    <input type="date" id="dateInput">
                </div>
            </div>
        </div>
        
        <div class="category-filter" id="categoryFilter">
            <div class="category-scroll" id="categoryScroll">
                <button class="category-button active" data-category="all">全部</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="card-container" id="cardContainer">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
        
        <div class="nav-controls">
            <button class="nav-btn favorite-btn" id="favoriteBtn">❤️ 收藏</button>
            <button class="nav-btn prev-btn" id="prevBtn">上一篇</button>
            <button class="nav-btn next-btn" id="nextBtn">下一篇</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="browse">浏览论文</div>
            <div class="tab" data-tab="collection">我的收藏</div>
        </div>
        
        <div class="collection-view" id="collectionView">
            <button class="export-btn" id="exportBtn">导出收藏</button>
            <div id="collectionList">
                <div class="loading">
                    <p>加载收藏...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        class MobileArXivApp {
            constructor() {
                const savedState = this.loadState();
                this.currentDate = savedState.date || this.getToday();
                this.currentIndex = savedState.index || 0;
                this.currentCategory = savedState.category || 'all';
                this.papers = [];
                this.paperData = {};
                this.filteredPapers = [];
                this.collections = this.loadCollections();
                this.repoOwner = 'yp51md';
                this.repoName = 'daily-arXiv-ai-enhanced';
                this.dataBranch = 'data';
                this.swipeStartX = 0;
                this.swipeStartY = 0;
                
                this.init();
            }
            
            getToday() {
                const today = new Date();
                return today.toISOString().split('T')[0];
            }
            
            init() {
                this.setupDateInput();
                this.setupTabs();
                this.setupExportButton();
                this.loadPapers();
            }
            
            loadState() {
                try {
                    const stored = localStorage.getItem('arxiv_mobile_state');
                    return stored ? JSON.parse(stored) : {};
                } catch (error) {
                    console.error('加载状态失败:', error);
                    return {};
                }
            }
            
            saveState() {
                try {
                    const state = {
                        date: this.currentDate,
                        index: this.currentIndex,
                        category: this.currentCategory
                    };
                    localStorage.setItem('arxiv_mobile_state', JSON.stringify(state));
                } catch (error) {
                    console.error('保存状态失败:', error);
                }
            }
            
            setupDateInput() {
                const dateInput = document.getElementById('dateInput');
                dateInput.value = this.currentDate;
                dateInput.addEventListener('change', (e) => {
                    this.currentDate = e.target.value;
                    this.currentIndex = 0;
                    this.currentCategory = 'all';
                    this.saveState();
                    this.loadPapers();
                });
            }
            
            setupTabs() {
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        
                        const tabName = tab.dataset.tab;
                        if (tabName === 'browse') {
                            document.getElementById('cardContainer').style.display = 'block';
                            document.getElementById('collectionView').classList.remove('active');
                            document.querySelector('.category-filter').style.display = 'block';
                        } else {
                            document.getElementById('cardContainer').style.display = 'none';
                            document.getElementById('collectionView').classList.add('active');
                            document.querySelector('.category-filter').style.display = 'none';
                            this.renderCollections();
                        }
                    });
                });
            }
            
            setupExportButton() {
                document.getElementById('exportBtn').addEventListener('click', () => {
                    this.exportCollections();
                });
            }
            
            async loadPapers() {
                const container = document.getElementById('cardContainer');
                container.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>加载论文中...</p>
                    </div>
                `;
                
                try {
                    const dataUrl = this.getDataUrl(`data/${this.currentDate}_AI_enhanced_Chinese.jsonl`);
                    const response = await fetch(dataUrl);
                    
                    if (!response.ok) {
                        throw new Error('数据加载失败');
                    }
                    
                    const text = await response.text();
                    this.paperData = this.parseJsonlData(text);
                    this.papers = this.getAllPapers();
                    this.filterPapers();
                    this.renderCategories();
                    
                    // 确保当前索引有效
                    if (this.currentIndex >= this.filteredPapers.length) {
                        this.currentIndex = Math.max(0, this.filteredPapers.length - 1);
                        this.saveState();
                    }
                    
                    if (this.filteredPapers.length === 0) {
                        container.innerHTML = `<div class="error">当天没有论文数据</div>`;
                        return;
                    }
                    
                    this.renderCard(this.currentIndex);
                } catch (error) {
                    container.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
                }
            }
            
            getDataUrl(filePath) {
                return `https://raw.githubusercontent.com/${this.repoOwner}/${this.repoName}/${this.dataBranch}/${filePath}`;
            }
            
            parseJsonlData(jsonlText) {
                const result = {};
                const lines = jsonlText.trim().split('\n');
                
                lines.forEach(line => {
                    try {
                        const paper = JSON.parse(line);
                        
                        if (!paper.categories) {
                            return;
                        }
                        
                        let allCategories = Array.isArray(paper.categories) ? paper.categories : [paper.categories];
                        
                        const primaryCategory = allCategories[0];
                        
                        if (!result[primaryCategory]) {
                            result[primaryCategory] = [];
                        }
                        
                        const summary = paper.AI && paper.AI.tldr ? paper.AI.tldr : paper.summary;
                        
                        result[primaryCategory].push({
                            id: paper.id,
                            title: paper.title,
                            summary: summary,
                            abstract: paper.summary || '',
                            categories: allCategories,
                            authors: Array.isArray(paper.authors) ? paper.authors.join(', ') : paper.authors,
                            motivation: paper.AI && paper.AI.motivation ? paper.AI.motivation : '',
                            method: paper.AI && paper.AI.method ? paper.AI.method : '',
                            result: paper.AI && paper.AI.result ? paper.AI.result : '',
                            conclusion: paper.AI && paper.AI.conclusion ? paper.AI.conclusion : ''
                        });
                    } catch (error) {
                        console.error('解析JSON失败:', error);
                    }
                });
                
                return result;
            }
            
            getAllPapers() {
                const papers = [];
                Object.values(this.paperData).forEach(categoryPapers => {
                    papers.push(...categoryPapers);
                });
                return papers;
            }
            
            renderCategories() {
                const categoryScroll = document.getElementById('categoryScroll');
                const categories = this.getAllCategories();
                
                let html = `<button class="category-button ${this.currentCategory === 'all' ? 'active' : ''}" data-category="all">全部</button>`;
                
                categories.sortedCategories.forEach(category => {
                    const count = categories.categoryCounts[category];
                    html += `
                        <button class="category-button ${this.currentCategory === category ? 'active' : ''}" data-category="${category}">${category}<span class="category-count">${count}</span></button>
                    `;
                });
                
                categoryScroll.innerHTML = html;
                
                // 添加分类点击事件
                document.querySelectorAll('.category-button').forEach(button => {
                    button.addEventListener('click', () => {
                        this.currentCategory = button.dataset.category;
                        document.querySelectorAll('.category-button').forEach(btn => btn.classList.remove('active'));
                        button.classList.add('active');
                        this.filterPapers();
                        this.currentIndex = 0;
                        this.saveState();
                        this.renderCard(this.currentIndex);
                    });
                });
            }
            
            getAllCategories() {
                const categories = Object.keys(this.paperData);
                const categoryCounts = {};
                
                categories.forEach(category => {
                    categoryCounts[category] = this.paperData[category] ? this.paperData[category].length : 0;
                });
                
                return {
                    sortedCategories: categories.sort((a, b) => {
                        return a.localeCompare(b);
                    }),
                    categoryCounts: categoryCounts
                };
            }
            
            filterPapers() {
                if (this.currentCategory === 'all') {
                    this.filteredPapers = this.papers;
                } else if (this.paperData[this.currentCategory]) {
                    this.filteredPapers = this.paperData[this.currentCategory];
                } else {
                    this.filteredPapers = [];
                }
            }
            
            renderCard(index) {
                const container = document.getElementById('cardContainer');
                const paper = this.filteredPapers[index];
                
                if (!paper) {
                    container.innerHTML = `<div class="error">没有更多论文</div>`;
                    return;
                }
                
                const totalCount = this.filteredPapers.length;
                const currentCount = index + 1;
                
                container.innerHTML = `
                    <div class="paper-card">
                        <div class="card-content">
                            <div class="paper-header">
                                <h2 class="paper-title">${paper.title}</h2>
                                <div class="paper-info">
                                    ${paper.authors}
                                </div>
                                <div class="paper-meta">
                                    ${currentCount}/${totalCount}
                                </div>
                            </div>
                            
                            <div class="ai-summary">${paper.summary}</div>
                            
                            <div class="tags">
                                ${paper.categories.map(category => `<span class="tag">${category}</span>`).join('')}
                            </div>
                            
                            ${paper.abstract ? `
                                <div class="paper-section">
                                    <h3 class="section-title">原文摘要</h3>
                                    <p class="section-content">${paper.abstract}</p>
                                </div>
                            ` : ''}
                            
                            ${paper.motivation ? `
                                <div class="paper-section">
                                    <h3 class="section-title">研究动机</h3>
                                    <p class="section-content">${paper.motivation}</p>
                                </div>
                            ` : ''}
                            
                            ${paper.method ? `
                                <div class="paper-section">
                                    <h3 class="section-title">研究方法</h3>
                                    <p class="section-content">${paper.method}</p>
                                </div>
                            ` : ''}
                            
                            ${paper.result ? `
                                <div class="paper-section">
                                    <h3 class="section-title">研究结果</h3>
                                    <p class="section-content">${paper.result}</p>
                                </div>
                            ` : ''}
                            
                            ${paper.conclusion ? `
                                <div class="paper-section">
                                    <h3 class="section-title">结论</h3>
                                    <p class="section-content">${paper.conclusion}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                this.updateNavButtons();
                this.updateFavoriteButton();
            }
            
            updateNavButtons() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                
                if (prevBtn) {
                    prevBtn.disabled = this.currentIndex === 0;
                    prevBtn.onclick = () => this.prevCard();
                }
                
                if (nextBtn) {
                    nextBtn.disabled = this.currentIndex === this.filteredPapers.length - 1;
                    nextBtn.onclick = () => this.nextCard();
                }
            }
            
            updateFavoriteButton() {
                const favoriteBtn = document.getElementById('favoriteBtn');
                if (favoriteBtn) {
                    const paper = this.filteredPapers[this.currentIndex];
                    if (paper) {
                        const isFavorited = this.isFavorited(paper.id);
                        favoriteBtn.textContent = isFavorited ? '❤️ 已收藏' : '🤍 收藏';
                        favoriteBtn.onclick = () => this.toggleFavorite(paper.id);
                    }
                }
            }
            
            prevCard() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.saveState();
                    this.renderCard(this.currentIndex);
                }
            }
            
            nextCard() {
                if (this.currentIndex < this.filteredPapers.length - 1) {
                    this.currentIndex++;
                    this.saveState();
                    this.renderCard(this.currentIndex);
                }
            }
            
            toggleFavorite(paperId) {
                const collectionKey = `favorites_${this.currentDate}`;
                let dayFavorites = this.collections[collectionKey] || [];
                
                const index = dayFavorites.indexOf(paperId);
                if (index > -1) {
                    dayFavorites.splice(index, 1);
                } else {
                    dayFavorites.push(paperId);
                }
                
                this.collections[collectionKey] = dayFavorites;
                this.saveCollections();
                this.updateFavoriteButton();
            }
            
            isFavorited(paperId) {
                const collectionKey = `favorites_${this.currentDate}`;
                const dayFavorites = this.collections[collectionKey] || [];
                return dayFavorites.includes(paperId);
            }
            
            loadCollections() {
                try {
                    const stored = localStorage.getItem('arxiv_collections');
                    if (!stored) return {};
                    
                    const data = JSON.parse(stored);
                    // 处理导出格式的数据
                    if (data.collections) {
                        return data.collections;
                    }
                    return data;
                } catch (error) {
                    console.error('加载收藏失败:', error);
                    return {};
                }
            }
            
            saveCollections() {
                try {
                    localStorage.setItem('arxiv_collections', JSON.stringify(this.collections));
                } catch (error) {
                    console.error('保存收藏失败:', error);
                }
            }
            
            renderCollections() {
                try {
                    const collectionList = document.getElementById('collectionList');
                    if (!collectionList) {
                        console.error('collectionList 元素不存在');
                        return;
                    }
                    
                    console.log('收藏数据:', this.collections);
                    
                    if (!this.collections || Object.keys(this.collections).length === 0) {
                        collectionList.innerHTML = `<div class="error">还没有收藏的论文</div>`;
                        return;
                    }
                    
                    let html = '';
                    Object.entries(this.collections).forEach(([dateKey, paperIds]) => {
                        if (!paperIds || paperIds.length === 0) return;
                        
                        const date = dateKey.replace('favorites_', '');
                        html += `
                            <div class="collection-section">
                                <h3 style="margin: 16px 0 8px 0;">${date}</h3>
                                ${paperIds.map(paperId => `
                                    <div class="collection-item">
                                        <h4>论文 ID: ${paperId}</h4>
                                        <div class="collection-actions">
                                            <button class="action-btn" onclick="app.removeFromCollection('${dateKey}', '${paperId}')">移除</button>
                                            <a href="https://arxiv.org/abs/${paperId}" target="_blank" class="action-btn">查看原文</a>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    });
                    
                    collectionList.innerHTML = html;
                } catch (error) {
                    console.error('渲染收藏失败:', error);
                    const collectionList = document.getElementById('collectionList');
                    if (collectionList) {
                        collectionList.innerHTML = `<div class="error">加载收藏失败: ${error.message}</div>`;
                    }
                }
            }
            
            removeFromCollection(dateKey, paperId) {
                if (this.collections[dateKey]) {
                    const index = this.collections[dateKey].indexOf(paperId);
                    if (index > -1) {
                        this.collections[dateKey].splice(index, 1);
                        this.saveCollections();
                        this.renderCollections();
                    }
                }
            }
            
            exportCollections() {
                const exportData = {
                    exportDate: new Date().toISOString(),
                    collections: this.collections
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `arxiv_favorites_${this.getToday()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }
        
        // 初始化应用
        const app = new MobileArXivApp();
    </script>
</body>
</html>
